<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grace Ashcroft</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cinzel:wght@500;700&family=Inter:wght@300;400;500;600&family=Montserrat:wght@700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'title': ['Cinzel', 'serif'],
                        'body': ['Inter', 'sans-serif'],
                        'montserrat': ['Montserrat', 'sans-serif'],
                        'playfair': ['Playfair Display', 'serif'],
                        'bebas': ['Bebas Neue', 'sans-serif'],
                    },
                    colors: {
                        'glass': 'rgba(20, 20, 20, 0.65)',
                        'glass-border': 'rgba(255, 255, 255, 0.08)',
                        'accent': '#D4AF37',
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 1s ease-out forwards',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(30px) scale(0.95)' },
                            '100%': { opacity: '1', transform: 'translateY(0) scale(1)' },
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        .bg-noise {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05;
            pointer-events: none;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .bg-animated-gradient {
            background: linear-gradient(-45deg, #0a0a0a, #1a1a1a, #2a2515, #0a0a0a);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }

        body::-webkit-scrollbar { width: 6px; }
        body::-webkit-scrollbar-track { background: #000; }
        body::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        body::-webkit-scrollbar-thumb:hover { background: #D4AF37; }

        .hover-glow:hover {
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.3);
            border-color: rgba(212, 175, 55, 0.5);
        }
    </style>
</head>

<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🥀</text></svg>">

<body class="bg-black text-neutral-200 font-body antialiased min-h-screen flex flex-col items-center justify-center p-4 md:p-8 overflow-x-hidden relative selection:bg-accent selection:text-black">

    <div id="enter-screen" class="fixed inset-0 z-[999] bg-black backdrop-blur-3xl flex items-center justify-center cursor-pointer transition-opacity duration-1000">
        <p class="text-white font-body font-light tracking-widest text-sm animate-pulse drop-shadow-lg text-center px-4">
            Click to enter...
        </p>
    </div>

    <div class="fixed inset-0 z-[-3] bg-animated-gradient"></div>
    <div class="fixed inset-0 z-[-2] bg-noise"></div>
    <div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-3xl h-full max-h-[800px] bg-accent/5 blur-[120px] rounded-full pointer-events-none z-[-1]"></div>

    <main class="w-full max-w-3xl bg-glass backdrop-blur-xl border border-glass-border rounded-3xl p-6 md:p-12 shadow-[0_0_80px_rgba(0,0,0,0.8)] animate-fade-in-up relative overflow-hidden my-10">
        
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-3/4 h-32 bg-accent/20 blur-[80px] rounded-full pointer-events-none"></div>

        <header class="text-center flex flex-col items-center mb-12 relative z-10">
            <div class="relative group cursor-pointer mb-6" onclick="openModal('images/grace-profile.jpg')">
                <div class="absolute -inset-1.5 bg-gradient-to-tr from-accent to-neutral-600 rounded-full blur opacity-40 group-hover:opacity-75 transition duration-500 animate-pulse-slow"></div>
                <img src="images/grace-profile.jpg" alt="Grace Ashcroft" class="relative w-32 h-32 object-cover rounded-full border-2 border-white/20 shadow-2xl transition-transform duration-500 group-hover:scale-105">
            </div>

            <h1 class="font-bebas text-4xl md:text-6xl font-bold text-transparent bg-clip-text bg-gradient-to-b from-white via-neutral-200 to-neutral-500 drop-shadow-[0_0_20px_rgba(255,255,255,0.4)] tracking-widest mb-3 uppercase">
                Grace Ashcroft
            </h1>
            
            <div class="flex flex-wrap justify-center gap-2 mb-6">
                <span class="px-3 py-1 bg-white/5 border border-white/10 rounded-full text-xs text-neutral-300 backdrop-blur-sm flex items-center gap-1.5">
                    <i data-lucide="heart" class="w-3 h-3 text-red-500 fill-current"></i> ILOVE
                </span>
                <span class="px-3 py-1 bg-white/5 border border-white/10 rounded-full text-xs text-neutral-300 backdrop-blur-sm flex items-center gap-1.5">
                    <i data-lucide="crown" class="w-3 h-3 text-accent"></i> Grace
                </span>
                <span class="px-3 py-1 bg-white/5 border border-white/10 rounded-full text-xs text-neutral-300 backdrop-blur-sm flex items-center gap-1.5">
                    <i data-lucide="infinity" class="w-3 h-3 text-blue-400"></i> Ashcroft
                </span>
            </div>

            <p class="font-bebas font-bold text-white text-lg md:text-xl max-w-md mx-auto tracking-widest">
                I LOVE GRACE ASHCROFT.
            </p>
        </header>

        <div class="w-full h-px bg-gradient-to-r from-transparent via-white/20 to-transparent mb-12"></div>

        <section class="mb-14 relative z-10 flex flex-col items-center">
            <h2 class="text-xs uppercase tracking-[0.3em] text-accent text-center mb-6 font-semibold flex items-center justify-center gap-2">
                <i data-lucide="play-circle" class="w-4 h-4"></i> Grace Ashcroft
            </h2>
            
            <div class="relative p-1 rounded-[2rem] bg-gradient-to-b from-white/10 to-transparent hover-glow transition-all duration-500 w-full max-w-[320px]">
                <div id="video-container" class="rounded-[1.75rem] overflow-hidden bg-black relative aspect-[9/16] flex items-center justify-center shadow-2xl border border-white/5 cursor-pointer">
                    <video id="graceVideo" class="w-full h-full object-cover" poster="images/capa-video.jpg" muted loop playsinline>
                        <source src="videos/grace.mp4" type="video/mp4">
                        Seu navegador não suporta a tag de vídeo.
                    </video>
                </div>
            </div>
        </section>

        </main>

    <div class="w-full max-w-[320px] mx-auto mb-10 relative z-10 flex justify-center opacity-90 mix-blend-screen animate-fade-in-up delay-300">
        <svg id="audio-visualizer" width="100%" height="120" viewBox="0 0 300 120" fill="none" xmlns="http://www.w3.org/2000/svg" class="overflow-visible">
            <defs>
                <filter id="gold-glow-wave" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur5"/>
                    <feColorMatrix in="blur5" type="matrix" values="1 0 0 0 0.83 0 1 0 0 0.68 0 0 1 0 0.21 0 0 0 1 0" result="goldBlur"/>
                    <feMerge>
                        <feMergeNode in="goldBlur"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
            </defs>
            <path id="visualizer-path" d="M0 60 L300 60" stroke="#D4AF37" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#gold-glow-wave)" />
        </svg>
    </div>

    <button id="global-audio-btn" class="fixed bottom-6 right-6 md:bottom-10 md:right-10 z-[90] bg-black/60 backdrop-blur-md border border-white/10 p-3 md:p-4 rounded-full text-white shadow-[0_0_20px_rgba(0,0,0,0.5)] hover:bg-white/10 hover:scale-110 transition-all duration-300 hidden">
        <i data-lucide="volume-2" class="w-6 h-6 text-accent"></i>
    </button>

    <footer class="text-center mb-6 opacity-50 hover:opacity-100 transition-opacity duration-300 z-10">
        <p class="text-[10px] uppercase tracking-[0.2em] text-white">
            ILOVE GRACE ASHCROFT &copy; 2026
        </p>
    </footer>

    <div id="lightbox" class="fixed inset-0 z-[100] bg-black/95 hidden items-center justify-center backdrop-blur-xl opacity-0 transition-opacity duration-300" onclick="closeModal()">
        <button class="absolute top-6 right-6 lg:top-10 lg:right-10 text-white/50 hover:text-white text-4xl transition-colors duration-200 focus:outline-none" onclick="closeModal()">&times;</button>
        <img id="lightbox-img" src="" alt="Imagem ampliada" class="max-w-[95vw] max-h-[90vh] object-contain rounded-lg shadow-[0_0_100px_rgba(0,0,0,0.9)] transition-transform duration-500 scale-95 border border-white/10">
    </div>

    <script>
        lucide.createIcons();

        const enterScreen = document.getElementById('enter-screen');
        const graceVideo = document.getElementById('graceVideo');
        const globalAudioBtn = document.getElementById('global-audio-btn');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');

        let audioCtx, analyser, source, dataArray;
        let smoothedValues = [0, 0, 0, 0, 0, 0, 0];
        const smoothingFactor = 0.15;

        // --- VISUALIZADOR ---
        function setupVisualizer() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                source = audioCtx.createMediaElementSource(graceVideo);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                analyser.fftSize = 64;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                animateVisualizer();
            }
        }

        function animateVisualizer() {
            requestAnimationFrame(animateVisualizer);
            if (!analyser) return;
            analyser.getByteFrequencyData(dataArray);

            const indices = [2, 5, 10, 15, 20, 25, 30];
            const sensitivity = [1.0, 1.2, 1.5, 1.8, 2.0, 2.2, 2.5];

            const targets = indices.map((idx, i) => {
                let value = dataArray[idx] || 0;
                let boostedValue = value * sensitivity[i];
                return Math.min(boostedValue, 255);
            });

            for (let i = 0; i < targets.length; i++) {
                let targetHeight = (targets[i] / 255) * 50;
                smoothedValues[i] += (targetHeight - smoothedValues[i]) * smoothingFactor;
            }

            const path = document.getElementById('visualizer-path');
            const center = 60;
            const totalWidth = 300;
            const startX = 80; 
            const activeWidth = 140; 
            const step = activeWidth / (smoothedValues.length - 1);

            let newD = `M 0 ${center} L ${startX} ${center} `; 

            for (let i = 0; i < smoothedValues.length; i++) {
                let x = startX + (step * i);
                let y = (i % 2 === 0) ? center - smoothedValues[i] : center + (smoothedValues[i] * 0.8);
                newD += `L ${x} ${y} `;
            }
            
            newD += `L ${totalWidth} ${center}`;
            path.setAttribute('d', newD);

            const avgVolume = targets.reduce((a, b) => a + b) / targets.length;
            
            // --- AJUSTE PARA VERMELHO ---
            path.style.stroke = "#ef4444"; // Vermelho vibrante (Tailwind red-500)
            path.style.strokeWidth = `${2.5 + (avgVolume / 40)}px`;
            path.style.opacity = 0.6 + (avgVolume / 255);
        }

        // --- CONTROLES ---
        function toggleAudio() {
            if (graceVideo.muted) {
                graceVideo.muted = false;
                globalAudioBtn.innerHTML = '<i data-lucide="volume-2" class="w-6 h-6 text-accent"></i>';
            } else {
                graceVideo.muted = true;
                globalAudioBtn.innerHTML = '<i data-lucide="volume-x" class="w-6 h-6 text-white"></i>';
            }
            lucide.createIcons();
        }

        enterScreen.addEventListener('click', () => {
            enterScreen.style.opacity = '0';
            setTimeout(() => { enterScreen.style.display = 'none'; }, 1000);
            setupVisualizer();
            graceVideo.muted = false;
            setTimeout(() => graceVideo.play(), 100);
            globalAudioBtn.classList.remove('hidden');
            lucide.createIcons();
        });

        globalAudioBtn.addEventListener('click', toggleAudio);

        // --- LIGHTBOX ---
        function openModal(imageSrc) {
            lightboxImg.src = imageSrc;
            lightbox.classList.remove('hidden');
            lightbox.classList.add('flex');
            setTimeout(() => {
                lightbox.classList.remove('opacity-0');
                lightboxImg.classList.remove('scale-95');
                lightboxImg.classList.add('scale-100');
            }, 10);
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            lightbox.classList.add('opacity-0');
            lightboxImg.classList.remove('scale-100');
            lightboxImg.classList.add('scale-95');
            setTimeout(() => {
                lightbox.classList.add('hidden');
                lightbox.classList.remove('flex');
                document.body.style.overflow = 'auto';
            }, 300);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape" && !lightbox.classList.contains('hidden')) closeModal();
        });
    </script>
</body>
</html>
